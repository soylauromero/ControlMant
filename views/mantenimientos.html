<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>ControlMant</title>

    <link rel="stylesheet" href="../css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg ">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">ControlMant</a>

            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Inicio</a>
                <a class="nav-link" href="activos.html">Activos</a>
                <a class="nav-link" href="mantenimientos.html">Mantenimientos</a>
                <a class="nav-link" href="historial.html">Historial</a>
                <a class="nav-link" href="alertas.html">Alertas</a>
            </div>
        </div>
    </nav>

    <header>
        <h1>Mantenimiento</h1>
    </header>

    <main class="container mt-4">

        <h2 class="mx-auto p-3">Nuevo Mantenimiento</h2>

        <form id="formMantenimiento" class="row g-3 card p-3">

            <div class="col-md-6">
                <label class="form-label">Activo</label>
                <select id="activoSelect" class="form-select"></select>
            </div>

            <div class="col-md-6">
                <label class="form-label">Estado</label>
                <select id="estado" class="form-select">
                    <option value="pendiente">Pendiente</option>
                    <option value="en proceso">En proceso</option>
                    <option value="finalizado">Finalizado</option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label">Descripción</label>
                <input type="text" id="descripcion" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Fecha inicio</label>
                <input type="date" id="fechaInicio" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Fecha fin</label>
                <input type="date" id="fechaFin" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Frecuencia (días)</label>
                <input type="number" id="frecuencia" class="form-control">
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-success">Guardar</button>
            </div>

        </form>

        <h2 class="mt-4">Lista de Mantenimientos</h2>

        <!-- filtro -->
        <div class="col-md-6">
            <select id="filtroEstado" class="form-select">
                <option value="">Todos</option>
                <option value="pendiente">Pendiente</option>
                <option value="en proceso">En proceso</option>
                <option value="finalizado">Finalizado</option>
            </select>
            <button class="btn btn-success" onclick="filtrarMantenimientos()">Filtrar</button>
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Activo</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th>Fecha fin</th>
                    <th>Frecuencia</th>
                    <th>Próxima</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="listaMantenimientos"></tbody>
        </table>

    </main>

    <script src="../js/models/Mantenimiento.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/mantenimientos.js"></script>

</body>

</html>
